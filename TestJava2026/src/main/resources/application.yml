info:
  description: Test Java 2026 API (Resources - /application.yml)
  version: 0.0.1
########################
server:
  servlet:
    context-path: /test-java-2026/api
  port: 8080
########################
spring:
  datasource:
    url: jdbc:h2:mem:test-java-2026-db
    driver-class-name: org.h2.Driver
    username: test
    password: TEst12345
  h2:
    console:
      enabled: false
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: true
########################
management:
  endpoints:
    web:
      exposure:
        include: health
########################
logging:
  level:
    root: INFO
    com.springboot.test: DEBUG